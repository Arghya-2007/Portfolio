<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8FBFA3" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#100F0D" stop-opacity="1"/>
    </radialGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;family=Inter:wght@400;500&amp;display=swap');
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#100F0D"/>
  
  <!-- Glow -->
  <circle cx="600" cy="315" r="600" fill="url(#glow)"/>

  <!-- Graphic Elements -->
  <circle cx="950" cy="315" r="150" fill="none" stroke="#E0937A" stroke-width="2" opacity="0.5" stroke-dasharray="10 10"/>
  <circle cx="950" cy="315" r="100" fill="none" stroke="#8FBFA3" stroke-width="4" opacity="0.8"/>
  
  <!-- Grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#F7F0E3" stroke-width="1" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Text -->
  <text x="120" y="320" font-family="'Space Grotesk', sans-serif" font-size="96" font-weight="bold" fill="#F2EDE4">DevArghya</text>
  <text x="120" y="400" font-family="'Inter', sans-serif" font-size="42" font-weight="500" fill="#8FBFA3">Infra for Intelligence</text>
  
  <!-- Bottom Accent -->
  <rect x="120" y="440" width="80" height="6" fill="#E0937A" rx="3"/>
</svg>
